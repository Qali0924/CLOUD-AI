<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOUD AI | TWÓJ INNOWACYJNY POMOCNIK!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] } };</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        /* ZMIENNE KOLORÓW - OBSŁUGA MOTYWÓW */
        :root {
            --sky: #a3e0f9; 
            --soft-blue: #3a86ff; 
            --dark: #023e8a;
            --glass: rgba(255, 255, 255, 0.75); 
            --white: #ffffff;
            --text: #023e8a;
            --card-bg: #ffffff;
            --success-bg: #d8f3dc;
        }

        /* CIEMNY MOTYW */
        [data-theme="dark"] {
            --sky: #0b132b;
            --soft-blue: #5bc0be;
            --dark: #ffffff;
            --glass: rgba(28, 37, 65, 0.85);
            --white: #1c2541;
            --text: #ffffff;
            --card-bg: #3a506b;
            --success-bg: #1b4332;
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Quicksand', sans-serif;
            background-color: var(--sky); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh; 
            transition: background-color 0.5s ease;
        }

        .sky-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cloud { background: var(--white); border-radius: 100px; position: absolute; filter: blur(10px); opacity: 0.3; animation: move linear infinite; }
        @keyframes move { from { left: -400px; } to { left: 100%; } }
        .c1 { width: 300px; height: 100px; top: 10%; animation-duration: 45s; }

        .container { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 650px; width: 100%; border: 2px solid rgba(255,255,255,0.2); text-align: center;
        }

        /* SIDEBAR I PRZYCISKI */
        .history-sidebar {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; padding: 30px 20px; color: var(--text);
        }
        .history-sidebar.active { right: 0; }

        .theme-switcher {
            display: flex; justify-content: space-around; margin: 20px 0;
            background: var(--card-bg); padding: 10px; border-radius: 15px;
        }
        .theme-btn { 
            cursor: pointer; font-size: 1.2rem; padding: 5px 10px; border-radius: 10px; border: none; background: transparent; color: var(--text);
        }
        .theme-btn:hover { background: var(--soft-blue); color: white; }

        .card { background: var(--card-bg); color: var(--text); padding: 12px; border-radius: 20px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; flex: 1; }
        .card.active { border-color: var(--soft-blue); }

        .solve-btn { background: linear-gradient(135deg, var(--soft-blue), var(--dark)); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }

        #result { margin-top: 25px; text-align: left; background: var(--card-bg); padding: 25px; border-radius: 30px; display: none; border: 2px solid var(--soft-blue); }

        /* PRZYCISK KOPIOWANIA */
        .copy-btn {
            background: var(--soft-blue); color: white; border: none; padding: 8px 15px;
            border-radius: 12px; cursor: pointer; font-size: 0.8rem; margin-top: 10px;
            display: none; align-items: center; gap: 5px; transition: 0.3s;
        }
        .copy-btn:hover { opacity: 0.9; transform: scale(1.05); }

        .chat-box { display: none; margin-top: 20px; padding: 20px; background: rgba(58, 134, 255, 0.1); border-radius: 25px; text-align: left; }
        .chat-input-group input { background: var(--card-bg); color: var(--text); border: 1px solid var(--soft-blue); flex: 1; padding: 12px; border-radius: 15px; outline: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky-bg"><div class="cloud c1"></div></div>

    <div class="history-sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0">⚙️ Opcje</h3>
            <button onclick="toggleHistory()" style="background:none; border:none; color:var(--text); font-size:1.5rem; cursor:pointer">×</button>
        </div>
        
        <p style="text-align:left; margin: 20px 0 5px; font-weight:bold">Tryb wyglądu:</p>
        <div class="theme-switcher">
            <button class="theme-btn" onclick="setTheme('light')">☀️ Jasny</button>
            <button class="theme-btn" onclick="setTheme('dark')">🌙 Ciemny</button>
        </div>

        <h3 style="margin-top:30px; border-top:1px solid var(--soft-blue); padding-top:20px">🕒 Historia</h3>
        <div id="historyList"></div>
    </div>

    <div class="container">
        <button onclick="toggleHistory()" style="background:var(--card-bg); color:var(--text); border:2px solid var(--soft-blue); padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer; margin-bottom:20px">
            ⚙️ Menu & Historia
        </button>
        
        <h1 style="color:var(--soft-blue)">☁️ CLOUD AI ☁️</h1>
        
        <span style="display:block; text-align:left; font-weight:bold; margin:20px 0 10px">Wybierz przedmiot:</span>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
            <div class="card active" onclick="setVal('subject', 'matematyka', this)"><span>📐</span>Matma</div>
            <div class="card" onclick="setVal('subject', 'polski', this)"><span>📚</span>Polski</div>
            <div class="card" onclick="setVal('subject', 'fizyka', this)"><span>⚛️</span>Fizyka</div>
        </div>

        <input type="hidden" id="subject" value="matematyka">

        <div style="background:var(--card-bg); border:3px dashed var(--soft-blue); border-radius:30px; padding:35px; margin:25px 0; cursor:pointer; position:relative">
            <span style="font-size:2.5rem">📸</span>
            <p id="fileName" style="margin:10px 0 0">Dodaj zdjęcie zadania</p>
            <input type="file" id="imageInput" accept="image/*" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer" onchange="document.getElementById('fileName').innerText = this.files[0].name">
        </div>

        <button class="solve-btn" id="solveBtn" onclick="solve()">ROZWIĄŻ ZADANIE</button>

        <div id="result"></div>
        <button id="copyBtn" class="copy-btn" onclick="copyResult()">
            <span>📋</span> Kopiuj do schowka
        </button>

        <div class="chat-box" id="chatSection">
            <strong>💬 Masz pytanie?</strong>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="chatInput" placeholder="Np. Wyjaśnij to...">
                <button onclick="askChat()" style="background:var(--soft-blue); color:white; border:none; padding:10px 20px; border-radius:15px; cursor:pointer">Pytaj</button>
            </div>
            <div id="chatResponse" style="margin-top:15px; border-left:3px solid var(--soft-blue); padding-left:10px"></div>
        </div>

        <div style="margin-top:30px; opacity:0.7">
            <small style="color:var(--soft-blue); font-weight:bold">🎧 SPOFY PLAYER</small>
            <audio controls style="width:100%; height:25px; filter: hue-rotate(180deg); margin-top:10px">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // MOTYW
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('cloudSolveTheme', theme);
        }
        // Inicjalizacja motywu
        const savedTheme = localStorage.getItem('cloudSolveTheme') || 'light';
        setTheme(savedTheme);

        // KOPIOWANIE
        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = "✅ Skopiowano!";
                setTimeout(() => btn.innerHTML = originalText, 2000);
            });
        }

        // RESZTA FUNKCJI (Logika bez zmian, dodane wywołania history i copy)
        function toggleHistory() { document.getElementById('sidebar').classList.toggle('active'); loadHistory(); }
        
        function setVal(id, val, el) {
            document.getElementById(id).value = val;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        async function solve() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return alert("Wgraj zdjęcie!");
            
            const btn = document.getElementById('solveBtn');
            const resDiv = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');

            btn.disabled = true; btn.innerText = "Chmurka myśli... ☁️";

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('subject', document.getElementById('subject').value);
            formData.append('level', 'liceum');

            try {
                const response = await fetch('/solve', { method: 'POST', body: formData });
                const data = await response.json();
                resDiv.innerHTML = marked.parse(data.result);
                resDiv.style.display = 'block';
                copyBtn.style.display = 'flex';
                document.getElementById('chatSection').style.display = 'block';
                if (window.MathJax) MathJax.typesetPromise([resDiv]);
                
                // Zapis do historii
                let history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
                history.unshift({ id: Date.now(), date: new Date().toLocaleString(), subject: document.getElementById('subject').value, content: data.result });
                localStorage.setItem('cloudSolveHistory', JSON.stringify(history.slice(0, 10)));
            } catch (err) { alert("Błąd serwera"); }
            finally { btn.disabled = false; btn.innerText = "ROZWIĄŻ ZADANIE"; }
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(item => `
                <div onclick="viewHistoryItem(${item.id})" style="background:var(--card-bg); padding:10px; margin-bottom:10px; border-radius:15px; cursor:pointer; text-align:left; border:1px solid var(--soft-blue)">
                    <strong>${item.subject}</strong><br><small>${item.date}</small>
                </div>`).join('') || '<p>Brak skanów</p>';
        }

        function viewHistoryItem(id) {
            const item = JSON.parse(localStorage.getItem('cloudSolveHistory')).find(i => i.id === id);
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = marked.parse(item.content);
            resDiv.style.display = 'block';
            document.getElementById('copyBtn').style.display = 'flex';
            document.getElementById('chatSection').style.display = 'block';
            if (window.MathJax) MathJax.typesetPromise([resDiv]);
            toggleHistory();
        }

        async function askChat() {
            const question = document.getElementById('chatInput').value;
            const resp = document.getElementById('chatResponse');
            if(!question) return;
            resp.innerText = "Piszę... ☁️";
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, context: document.getElementById('result').innerText })
            });
            const data = await res.json();
            resp.innerHTML = marked.parse(data.answer);
            if (window.MathJax) MathJax.typesetPromise([resp]);
        }
    </script>
</body>
</html>
