<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClOUD AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --sky-blue: #a3e0f9;
            --soft-blue: #3a86ff;
            --dark-blue: #023e8a;
            --glass: rgba(255, 255, 255, 0.7);
            --cloud: #ffffff;
            --success: #2d6a4f;
            --success-bg: #d8f3dc;
        }

        body { 
            margin: 0; padding: 20px;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--sky-blue);
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* TŁO CHMURKI */
        .sky-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cloud { background: var(--cloud); border-radius: 100px; position: absolute; filter: blur(8px); opacity: 0.5; animation: move linear infinite; }
        @keyframes move { 0% { left: -400px; } 100% { left: 100%; } }
        .c1 { width: 300px; height: 100px; top: 10%; animation-duration: 40s; }
        .c2 { width: 200px; height: 60px; top: 60%; animation-duration: 30s; left: -200px; }

        .container { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px; width: 100%; border: 2px solid white; text-align: center;
        }

        h1 { color: var(--soft-blue); margin: 0; font-size: 2.5rem; }
        .tagline { color: var(--dark-blue); opacity: 0.7; margin-bottom: 20px; }

        /* SELEKTORY */
        .picker-label { font-weight: bold; color: var(--dark-blue); display: block; margin: 15px 0 5px; text-align: left; font-size: 0.9rem; }
        .picker { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
        .card { 
            background: white; padding: 12px 20px; border-radius: 18px; cursor: pointer;
            border: 3px solid transparent; transition: 0.3s; flex: 1; min-width: 100px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card.active { border-color: var(--soft-blue); transform: scale(1.05); background: #f0f7ff; }
        .card span { font-size: 1.5rem; display: block; }

        /* UPLOAD */
        .file-zone {
            background: white; border: 3px dashed var(--sky-blue); border-radius: 25px;
            padding: 30px; margin: 20px 0; cursor: pointer; position: relative;
        }
        .file-zone:hover { border-color: var(--soft-blue); }
        .file-zone input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        .btn {
            background: linear-gradient(135deg, var(--soft-blue), var(--dark-blue));
            color: white; border: none; padding: 15px 30px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%;
            box-shadow: 0 10px 20px rgba(58, 134, 255, 0.3); transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(58, 134, 255, 0.4); }

        /* WYNIK I ZIELONE ZAZNACZENIE */
        #result { 
            margin-top: 20px; text-align: left; background: white; padding: 25px;
            border-radius: 25px; display: none; border: 2px solid var(--sky-blue);
        }
        #result strong { 
            color: var(--success); background: var(--success-bg); 
            padding: 2px 5px; border-radius: 5px; 
        }

        .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 5px solid #f3f3f3; border-top: 5px solid var(--soft-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky-background">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
    </div>

    <div class="container">
        <h1>☁️ CLOUD AI ☁️</h1>
        <p class="tagline">TWÓJ INNTELIGENTNY MÓZG!</p>

        <span class="picker-label">Wybierz przedmiot:</span>
        <div class="picker" id="subjectPicker">
            <div class="card active" onclick="setVal('subject', 'matematyka', this)"><span>📐</span>Matma</div>
            <div class="card" onclick="setVal('subject', 'polski', this)"><span>📚</span>Polski</div>
            <div class="card" onclick="setVal('subject', 'fizyka', this)"><span>⚛️</span>Fizyka</div>
            <div class="card" onclick="setVal('subject', 'inne', this)"><span>🌍</span>Inne</div>
        </div>

        <span class="picker-label">Poziom:</span>
        <div class="picker" id="levelPicker">
            <div class="card active" onclick="setVal('level', 'liceum', this)">Liceum</div>
            <div class="card" onclick="setVal('level', 'podstawowka', this)">Podstawówka</div>
        </div>

        <input type="hidden" id="subject" value="matematyka">
        <input type="hidden" id="level" value="liceum">

        <div class="file-zone">
            <span style="font-size: 2rem;">📸</span>
            <p id="fileName">Kliknij, aby dodać zdjęcie zadania</p>
            <input type="file" id="imageInput" accept="image/*" onchange="document.getElementById('fileName').innerText = this.files[0].name">
        </div>

        <button class="btn" id="solveBtn" onclick="solve()">ROZWIĄŻ ZADANIE</button>

        <div class="loader" id="loader"></div>
        <div id="result"></div>

        <div style="margin-top:25px; opacity:0.8">
            <small style="color:var(--soft-blue); font-weight:bold">🎧 SPOFY PLAYER</small>
            <audio controls style="width:100%; height:30px; filter: hue-rotate(180deg); margin-top:5px">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        function setVal(id, val, el) {
            document.getElementById(id).value = val;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        async function solve() {
            const fileInput = document.getElementById('imageInput');
            const resDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('solveBtn');

            if (!fileInput.files[0]) return alert("Wgraj zdjęcie! ☁️");

            btn.disabled = true; loader.style.display = 'block'; resDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('level', document.getElementById('level').value);
            formData.append('subject', document.getElementById('subject').value);

            try {
                const response = await fetch('/solve', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                resDiv.innerHTML = marked.parse(data.result);
                resDiv.style.display = 'block';
                if (window.MathJax) MathJax.typesetPromise([resDiv]);
            } catch (err) {
                alert("Błąd: " + err.message);
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
