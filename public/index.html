<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">CLOUD AI | TWÓJ INNOWACYJNY POMOCNIK!</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --sky: #a3e0f9; --soft-blue: #3a86ff; --dark: #023e8a;
            --glass: rgba(255, 255, 255, 0.75); --white: #ffffff;
            --text: #023e8a; --card-bg: #ffffff; --success-bg: #d8f3dc;
        }

        [data-theme="dark"] {
            --sky: #0b132b; --soft-blue: #5bc0be; --dark: #ffffff;
            --glass: rgba(28, 37, 65, 0.85); --white: #1c2541;
            --text: #ffffff; --card-bg: #3a506b; --success-bg: #1b4332;
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Quicksand', sans-serif;
            background-color: var(--sky); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh; 
            transition: all 0.3s ease;
        }

        .sky-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cloud { background: var(--white); border-radius: 100px; position: absolute; filter: blur(10px); opacity: 0.3; animation: move linear infinite; }
        @keyframes move { from { left: -400px; } to { left: 100%; } }
        .c1 { width: 300px; height: 100px; top: 10%; animation-duration: 45s; }

        .container { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 650px; width: 100%; border: 2px solid rgba(255,255,255,0.2); text-align: center;
            transition: all 0.3s ease;
        }

        /* STYL TRYBU ŚCIĄGANIA */
        body.cheat-active { background: #ffffff !important; font-family: serif !important; }
        body.cheat-active .container { 
            background: #ffffff !important; border: none !important; 
            box-shadow: none !important; backdrop-filter: none !important;
            max-width: 800px; text-align: left;
        }
        body.cheat-active .cloud, body.cheat-active .sky-bg, body.cheat-active .user-panel, 
        body.cheat-active .picker, body.cheat-active .section-title, body.cheat-active .solve-btn, 
        body.cheat-active h1, body.cheat-active p, body.cheat-active .history-btn, body.cheat-active audio, body.cheat-active small {
            display: none !important;
        }
        body.cheat-active #result { border: none !important; padding: 0 !important; font-size: 14px; color: #000; }
        body.cheat-active .cheat-ui { background: #f9f9f9 !important; border: 1px solid #ddd !important; padding: 10px !important; border-radius: 5px !important; }

        .user-panel { background: var(--card-bg); padding: 15px; border-radius: 25px; margin-bottom: 20px; border: 1px solid var(--soft-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .login-btn { background: #db4437; color: white; border: none; padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        
        .history-sidebar {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: 0.5s;
            z-index: 1000; padding: 30px 20px; color: var(--text); overflow-y: auto;
        }
        .history-sidebar.active { right: 0; }

        .section-title { display:block; text-align:left; font-weight:bold; margin:20px 0 10px; font-size: 0.9rem; }
        .picker { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .card { background: var(--card-bg); color: var(--text); padding: 12px; border-radius: 20px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; flex: 1; min-width: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card.active { border-color: var(--soft-blue); transform: translateY(-3px); }

        .solve-btn { background: linear-gradient(135deg, var(--soft-blue), var(--dark)); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 10px 20px rgba(58, 134, 255, 0.3); transition: 0.3s; }
        
        #result { margin-top: 25px; text-align: left; background: var(--card-bg); padding: 25px; border-radius: 30px; display: none; border: 2px solid var(--soft-blue); line-height: 1.6; }
        
        .loader { display: none; margin: 20px auto; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--soft-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cheat-ui {
            margin: 20px 0; padding: 15px; background: rgba(255, 77, 77, 0.1); 
            border: 2px solid #ff4d4d; border-radius: 20px; transition: 0.3s;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky-bg"><div class="cloud c1"></div></div>

    <div class="history-sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0">⚙️ Opcje</h3>
            <button onclick="toggleHistory()" style="background:none; border:none; color:var(--text); font-size:1.8rem; cursor:pointer">×</button>
        </div>
        <div id="historyList"></div>
    </div>

    <div class="container">
        <div class="user-panel">
            <button id="loginBtn" class="login-btn" onclick="login()">🔑 ZALOGUJ SIĘ PRZEZ GOOGLE 🔑</button>
            <div id="userInfo" style="display:none;">
                <span id="userName" style="font-weight:bold;"></span><br>
                <small>LIMIT: <span id="userUsage">0/5</span></small>
                <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-size:0.75rem; text-decoration: underline;">Wyloguj</button>
            </div>
        </div>

        <button class="history-btn" onclick="toggleHistory()" style="background:var(--card-bg); color:var(--text); border:2px solid var(--soft-blue); padding:10px 25px; border-radius:20px; font-weight:bold; cursor:pointer; margin-bottom:20px;">
            ⚙️ Menu & Historia
        </button>
        
        <h1 id="mainH1">☁️ CLOUD AI ☁️</h1>
        <p id="mainP">TWÓJ POMOCNIK W SZKOLE!</p>

        <div class="cheat-ui" id="cheatPanel">
            <label style="display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: #d00000;">
                <input type="checkbox" id="cheatMode" style="width: 20px; height: 20px; margin-right: 10px;" onchange="toggleCheatMode()"> 
                ⚡ TRYB ŚCIĄGANIE (SZYBKO I KONKRETNIE)
            </label>
        </div>
        
        <span class="section-title">Wybierz przedmiot:</span>
        <div class="picker">
            <div class="card active" onclick="setVal('subject', 'matematyka', this)"><span>📐</span>Matma</div>
            <div class="card" onclick="setVal('subject', 'polski', this)"><span>📚</span>Polski</div>
            <div class="card" onclick="setVal('subject', 'fizyka', this)"><span>⚛️</span>Fizyka</div>
            <div class="card" onclick="setVal('subject', 'inne', this)"><span>🌍</span>Inne</div>
        </div>

        <span class="section-title">Poziom szkoły:</span>
        <div class="picker">
            <div class="card active" onclick="setVal('level', 'liceum', this)">Liceum</div>
            <div class="card" onclick="setVal('level', 'podstawowka', this)">Podstawówka</div>
        </div>

        <input type="hidden" id="subject" value="matematyka">
        <input type="hidden" id="level" value="liceum">

        <div id="dropZone" style="background:var(--card-bg); border:3px dashed var(--soft-blue); border-radius:30px; padding:35px; margin:25px 0; cursor:pointer; position:relative">
            <span style="font-size:2.5rem">📸</span>
            <p id="fileName" style="margin:10px 0 0; font-weight: bold;">Dodaj zdjęcie zadania</p>
            <input type="file" id="imageInput" accept="image/*" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer" onchange="handleFile(this)">
        </div>

        <button class="solve-btn" id="solveBtn" onclick="solve()">ROZWIĄŻ ZADANIE</button>
        <div class="loader" id="loader"></div>

        <div id="result"></div>
        <button id="copyBtn" class="copy-btn" onclick="copyResult()" style="display:none; width:100%; padding:15px; margin-top:10px; border-radius:15px; border:none; background:var(--soft-blue); color:white; font-weight:bold; cursor:pointer;">📋 Kopiuj wynik</button>

        <div style="margin-top:35px; padding-top: 15px; border-top: 1px dashed var(--soft-blue); opacity:0.8">
            <small style="color:var(--soft-blue); font-weight:bold">🎧 SPOFY PLAYER</small>
            <audio id="mainAudio" controls style="width:100%; height:30px; filter: hue-rotate(180deg); margin-top:10px">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm5UHUdv5thmBaOrm4x9rNT4GSqh8Zg0Q",
            authDomain: "cloud-ai-ac869.firebaseapp.com",
            projectId: "cloud-ai-ac869",
            storageBucket: "cloud-ai-ac869.firebasestorage.app",
            messagingSenderId: "488239859442",
            appId: "1:488239859442:web:cc50de432944c73cf2f26b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // LOGIKA TRYBU ŚCIĄGANIA
        function toggleCheatMode() {
            const isCheat = document.getElementById('cheatMode').checked;
            const body = document.body;
            const title = document.getElementById('pageTitle');
            
            if (isCheat) {
                body.classList.add('cheat-active');
                title.innerText = "Notatki z zajęć - Projekt";
            } else {
                body.classList.remove('cheat-active');
                title.innerText = "CLOUD AI | TWÓJ POMOCNIK!";
            }
        }

        // Reszta funkcji systemowych
        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                syncUserStatus();
            }
        });

        async function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); location.reload(); }

        async function syncUserStatus() {
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('userUsage').innerText = data.premium ? "∞" : `${data.usage || 0}/5`;
            }
        }

        function setVal(id, val, el) {
            document.getElementById(id).value = val;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function handleFile(input) {
            if(input.files[0]) document.getElementById('fileName').innerText = input.files[0].name;
        }

        async function solve() {
            if (!currentUser) return alert("Zaloguj się! 🔑");
            
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return alert("Wgraj zdjęcie! 📸");

            const isCheat = document.getElementById('cheatMode').checked;
            const btn = document.getElementById('solveBtn');
            const loader = document.getElementById('loader');
            const resDiv = document.getElementById('result');

            btn.disabled = true; loader.style.display = 'block';
            
            // Odtwórz muzykę przy rozwiązywaniu
            document.getElementById('mainAudio').play();

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('subject', document.getElementById('subject').value);
            formData.append('level', document.getElementById('level').value);
            formData.append('isCheat', isCheat); // Przesyłamy info o trybie do serwera

            try {
                const response = await fetch('/solve', { method: 'POST', body: formData });
                const data = await response.json();
                
                resDiv.innerHTML = marked.parse(data.result);
                resDiv.style.display = 'block';
                document.getElementById('copyBtn').style.display = 'block';

                if (window.MathJax) await MathJax.typesetPromise([resDiv]);
                
                // Aktualizacja użycia w Firebase
                await db.collection('users').doc(currentUser.uid).update({
                    usage: firebase.firestore.FieldValue.increment(1)
                });
                syncUserStatus();
            } catch (err) {
                alert("Błąd serwera.");
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        }

        function toggleHistory() { document.getElementById('sidebar').classList.toggle('active'); }
        
        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text);
            alert("Skopiowano!");
        }
    </script>
</body>
</html>
