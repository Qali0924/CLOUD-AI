<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOFY AI | SYSTEM ANALIZY EDUKACYJNEJ</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --bg: #0a0b10;
            --card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #2ecc71; /* Twoja zieleń */
            --accent-glow: rgba(46, 204, 113, 0.2);
            --text: #e0e0e0;
            --soft-blue: #3a86ff;
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Quicksand', sans-serif;
            background-color: var(--bg); color: var(--text);
            background-image: radial-gradient(circle at top right, rgba(58, 134, 255, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(46, 204, 113, 0.05), transparent);
            display: flex; justify-content: center; min-height: 100vh; 
            transition: 0.5s ease;
        }

        .container { 
            background: var(--card); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px; border-radius: 28px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            max-width: 650px; width: 100%; 
            border: 1px solid var(--glass-border); 
            text-align: center;
        }

        h1 {
            font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .user-panel { 
            background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 16px; margin-bottom: 25px; 
            border: 1px solid var(--glass-border); 
        }

        .history-sidebar {
            position: fixed; right: -340px; top: 0; width: 320px; height: 100%;
            background: rgba(10, 11, 16, 0.95); backdrop-filter: blur(30px);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 40px 25px; border-left: 1px solid var(--glass-border); overflow-y: auto;
        }
        .history-sidebar.active { right: 0; }

        .section-title { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin: 25px 0 10px; font-weight: bold; }
        
        .picker { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; }
        
        .card { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; 
            cursor: pointer; border: 1px solid var(--glass-border); transition: 0.3s;
        }
        .card.active { border-color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 20px var(--accent-glow); }
        .card span { font-size: 1.4rem; margin-bottom: 5px; display: block; }

        .upload-box {
            background: rgba(255,255,255,0.02); border: 2px dashed var(--glass-border);
            border-radius: 20px; padding: 35px; margin: 25px 0; transition: 0.3s;
            position: relative;
        }
        .upload-box:hover { border-color: var(--accent); background: rgba(46, 204, 113, 0.02); }

        .solve-btn { 
            background: var(--accent); color: #000; border: none; padding: 18px; 
            border-radius: 16px; font-size: 1.1rem; font-weight: 800; cursor: pointer; 
            width: 100%; transition: 0.3s; text-transform: uppercase;
        }
        .solve-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 30px var(--accent-glow); }
        .solve-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #result { 
            margin-top: 30px; text-align: left; background: #000; padding: 25px; 
            border-radius: 20px; display: none; border: 1px solid var(--accent); 
            line-height: 1.6; font-size: 0.95rem;
        }
        #result strong { color: var(--accent); }

        .copy-btn { 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); 
            padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-top: 15px; 
            display: none; font-size: 0.85rem; font-weight: bold; 
        }

        .chat-box { 
            display: none; margin-top: 25px; padding: 20px; 
            background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--glass-border);
        }
        .chat-input-group { display: flex; gap: 10px; margin-top: 12px; }
        .chat-input-group input {
            background: #000; color: #fff; border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px; flex: 1; outline: none;
        }

        .loader { display: none; margin: 20px auto; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .player-mini {
            background: #000; padding: 15px; border-radius: 20px; margin-top: 40px;
            border: 1px solid var(--glass-border);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

    <div class="history-sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; color:var(--accent)">SPOFY MENU</h2>
            <button onclick="toggleHistory()" style="background:none; border:none; color:#fff; font-size:2rem; cursor:pointer">×</button>
        </div>
        <div id="historyList" style="margin-top:30px"></div>
    </div>

    <div class="container">
        <div class="user-panel">
            <button id="loginBtn" style="background:#db4437; color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:bold; width:100%" onclick="login()">🔑 Zaloguj przez Google</button>
            <div id="userInfo" style="display:none; text-align: left; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span id="userName" style="font-weight:bold; color:var(--accent)"></span><br>
                    <small>Limit: <span id="userUsage">0/5</span></small>
                </div>
                <button onclick="logout()" style="color:#ff4d4d; border:none; background:none; cursor:pointer; text-decoration:underline; font-size:0.8rem">Wyloguj</button>
            </div>
        </div>

        <button onclick="toggleHistory()" style="background:none; border:1px solid var(--glass-border); color:#fff; padding:8px 20px; border-radius:50px; cursor:pointer; margin-bottom:15px; font-size:0.8rem">
            🕒 Historia skanów
        </button>

        <h1>CLOUD AI</h1>
        <p style="opacity:0.4; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 30px;">ADVANCED SOLUTIONS ENGINE</p>

        <span class="section-title">Przedmiot</span>
        <div class="picker">
            <div class="card active" onclick="setVal('subject', 'matematyka', this)"><span>📐</span>Matma</div>
            <div class="card" onclick="setVal('subject', 'polski', this)"><span>📚</span>Polski</div>
            <div class="card" onclick="setVal('subject', 'fizyka', this)"><span>⚛️</span>Fizyka</div>
            <div class="card" onclick="setVal('subject', 'inne', this)"><span>🌍</span>Inne</div>
        </div>

        <span class="section-title">Poziom Szkoły</span>
        <div class="picker">
            <div class="card active" onclick="setVal('level', 'liceum', this)">Liceum</div>
            <div class="card" onclick="setVal('level', 'podstawowka', this)">Podstawówka</div>
        </div>

        <input type="hidden" id="subject" value="matematyka">
        <input type="hidden" id="level" value="liceum">

        <div class="upload-box">
            <span style="font-size:2rem; display:block; margin-bottom:10px">📸</span>
            <b id="fileName" style="font-size:0.9rem">DODAJ ZDJĘCIE ZADANIA</b>
            <input type="file" id="imageInput" accept="image/*" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer" onchange="document.getElementById('fileName').innerText = this.files[0].name">
        </div>

        <button class="solve-btn" id="solveBtn" onclick="solve()">Analizuj zadanie</button>
        <div class="loader" id="loader"></div>

        <div id="result"></div>
        <button id="copyBtn" class="copy-btn" onclick="copyResult()">📋 KOPIUJ WYNIK</button>

        <div class="chat-box" id="chatSection">
            <small style="opacity:0.6">ZADAJ PYTANIE POMOCNICZE:</small>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="Skąd się wziął ten wynik?">
                <button onclick="askChat()" style="background:var(--accent); border:none; padding:10px 15px; border-radius:10px; cursor:pointer; font-weight:bold">PYTAJ</button>
            </div>
            <div id="chatResponse" style="margin-top:15px; font-size: 0.9rem; color: #bbb; border-left: 2px solid var(--accent); padding-left: 10px;"></div>
        </div>

        <div class="player-mini">
            <small style="color:var(--accent); display:block; margin-bottom:8px; font-weight:bold; letter-spacing:1px; font-size:0.7rem">SPOFY SYSTEM AUDIO</small>
            <audio controls style="width:100%; height:30px; filter: invert(1) hue-rotate(90deg);">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Z Twojego kodu)
        const firebaseConfig = {
            apiKey: "AIzaSyCm5UHUdv5thmBaOrm4x9rNT4GSqh8Zg0Q",
            authDomain: "cloud-ai-ac869.firebaseapp.com",
            projectId: "cloud-ai-ac869",
            storageBucket: "cloud-ai-ac869.firebasestorage.app",
            messagingSenderId: "488239859442",
            appId: "1:488239859442:web:cc50de432944c73cf2f26b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userName').innerText = user.displayName;
                await syncUserStatus();
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
        });

        async function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); location.reload(); }

        async function syncUserStatus() {
            if (!currentUser) return;
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            const today = new Date().toDateString();

            if (!doc.exists) {
                await docRef.set({ email: currentUser.email, usage: 0, premium: false, lastReset: today });
            } else {
                const data = doc.data();
                if (data.lastReset !== today) {
                    await docRef.update({ usage: 0, lastReset: today });
                }
                document.getElementById('userUsage').innerText = data.premium ? "∞" : `${data.usage || 0}/5`;
            }
        }

        function setVal(id, val, el) {
            document.getElementById(id).value = val;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleHistory() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            loadHistory(); 
        }

        async function solve() {
            if (!currentUser) return alert("Zaloguj się! 🔑");
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return alert("Wgraj zdjęcie! 📸");

            const btn = document.getElementById('solveBtn');
            const loader = document.getElementById('loader');
            const resDiv = document.getElementById('result');

            btn.disabled = true; loader.style.display = 'block'; resDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('subject', document.getElementById('subject').value);
            formData.append('level', document.getElementById('level').value);

            try {
                const response = await fetch('/solve', { method: 'POST', body: formData });
                const data = await response.json();
                
                resDiv.innerHTML = marked.parse(data.result);
                resDiv.style.display = 'block';
                document.getElementById('copyBtn').style.display = 'block';
                document.getElementById('chatSection').style.display = 'block';

                if (window.MathJax) await MathJax.typesetPromise([resDiv]);

                // Update Usage
                await db.collection('users').doc(currentUser.uid).update({
                    usage: firebase.firestore.FieldValue.increment(1)
                });
                syncUserStatus();

                // Save History
                let history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
                history.unshift({ id: Date.now(), date: new Date().toLocaleString(), subject: document.getElementById('subject').value, content: data.result });
                localStorage.setItem('cloudSolveHistory', JSON.stringify(history.slice(0, 10)));
            } catch (err) { alert("Błąd serwera."); }
            finally { btn.disabled = false; loader.style.display = 'none'; }
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(item => `
                <div onclick="viewHistoryItem(${item.id})" style="background:rgba(255,255,255,0.05); padding:12px; margin-bottom:10px; border-radius:12px; cursor:pointer; font-size:0.8rem; border:1px solid var(--glass-border)">
                    <strong>${item.subject.toUpperCase()}</strong><br><small>${item.date}</small>
                </div>`).join('') || '<p style="font-size:0.8rem; opacity:0.5">Brak historii.</p>';
        }

        async function viewHistoryItem(id) {
            const history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
            const item = history.find(i => i.id === id);
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = marked.parse(item.content);
            resDiv.style.display = 'block';
            if (window.MathJax) await MathJax.typesetPromise([resDiv]);
            toggleHistory();
        }

        async function askChat() {
            const question = document.getElementById('chatInput').value;
            const resp = document.getElementById('chatResponse');
            if(!question) return;
            resp.innerText = "Myślę... ☁️";
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, context: document.getElementById('result').innerText })
                });
                const data = await res.json();
                resp.innerHTML = marked.parse(data.answer);
                if (window.MathJax) await MathJax.typesetPromise([resp]);
            } catch(e) { resp.innerText = "Błąd czatu."; }
        }

        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text);
            alert("Skopiowano!");
        }
    </script>
</body>
</html>
