<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOUD AI | TWÓJ INNOWACYJNY POMOCNIK!</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --sky: #a3e0f9; --soft-blue: #3a86ff; --dark: #023e8a;
            --glass: rgba(255, 255, 255, 0.75); --white: #ffffff;
            --text: #023e8a; --card-bg: #ffffff; --success-bg: #d8f3dc;
        }

        [data-theme="dark"] {
            --sky: #0b132b; --soft-blue: #5bc0be; --dark: #ffffff;
            --glass: rgba(28, 37, 65, 0.85); --white: #1c2541;
            --text: #ffffff; --card-bg: #3a506b; --success-bg: #1b4332;
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Quicksand', sans-serif;
            background-color: var(--sky); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh; 
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .sky-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cloud { background: var(--white); border-radius: 100px; position: absolute; filter: blur(10px); opacity: 0.3; animation: move linear infinite; }
        @keyframes move { from { left: -400px; } to { left: 100%; } }
        .c1 { width: 300px; height: 100px; top: 10%; animation-duration: 45s; }

        .container { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 650px; width: 100%; border: 2px solid rgba(255,255,255,0.2); text-align: center;
        }

        /* USER PANEL */
        .user-panel { background: var(--card-bg); padding: 15px; border-radius: 25px; margin-bottom: 20px; border: 1px solid var(--soft-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .login-btn { background: #db4437; color: white; border: none; padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .login-btn:hover { background: #c53727; transform: scale(1.02); }

        /* SIDEBAR */
        .history-sidebar {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; padding: 30px 20px; color: var(--text); overflow-y: auto;
        }
        .history-sidebar.active { right: 0; }

        .theme-switcher { display: flex; justify-content: space-around; margin: 20px 0; background: var(--card-bg); padding: 10px; border-radius: 15px; }
        .theme-btn { cursor: pointer; font-size: 1rem; padding: 8px; border-radius: 10px; border: none; background: transparent; color: var(--text); font-family: inherit; font-weight: bold; flex: 1; }
        .theme-btn:hover { background: var(--soft-blue); color: white; }

        /* CARDS */
        .section-title { display:block; text-align:left; font-weight:bold; margin:20px 0 10px; font-size: 0.9rem; }
        .picker { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .card { background: var(--card-bg); color: var(--text); padding: 12px; border-radius: 20px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; flex: 1; min-width: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card.active { border-color: var(--soft-blue); transform: translateY(-3px); }
        .card span { display: block; font-size: 1.5rem; }

        /* BUTTONS & OUTPUT */
        .solve-btn { background: linear-gradient(135deg, var(--soft-blue), var(--dark)); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 10px 20px rgba(58, 134, 255, 0.3); transition: 0.3s; }
        .solve-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #result { margin-top: 25px; text-align: left; background: var(--card-bg); padding: 25px; border-radius: 30px; display: none; border: 2px solid var(--soft-blue); line-height: 1.6; }
        #result strong { color: #1b4332; background: var(--success-bg); padding: 2px 6px; border-radius: 6px; }

        .copy-btn { background: var(--soft-blue); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-size: 0.9rem; margin-top: 15px; display: none; align-items: center; gap: 8px; font-weight: bold; }

        .chat-box { display: none; margin-top: 20px; padding: 20px; background: rgba(58, 134, 255, 0.1); border-radius: 25px; text-align: left; }
        .chat-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input-group input { background: var(--card-bg); color: var(--text); border: 1px solid var(--soft-blue); flex: 1; padding: 12px; border-radius: 15px; outline: none; }
        
        .loader { display: none; margin: 20px auto; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--soft-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky-bg"><div class="cloud c1"></div></div>

    <div class="history-sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0">⚙️ Opcje</h3>
            <button onclick="toggleHistory()" style="background:none; border:none; color:var(--text); font-size:1.8rem; cursor:pointer">×</button>
        </div>
        
        <p style="text-align:left; margin: 20px 0 5px; font-weight:bold">Wygląd:</p>
        <div class="theme-switcher">
            <button class="theme-btn" onclick="setTheme('light')">☀️ Jasny</button>
            <button class="theme-btn" onclick="setTheme('dark')">🌙 Ciemny</button>
        </div>

        <h3 style="margin-top:30px; border-top:1px solid var(--soft-blue); padding-top:20px">🕒 Historia</h3>
        <div id="historyList"></div>
    </div>

    <div class="container">
        <div class="user-panel">
            <button id="loginBtn" class="login-btn" onclick="login()">🔑 Zaloguj przez Google</button>
            <div id="userInfo" style="display:none;">
                <span id="userName" style="font-weight:bold; font-size: 1.1rem;"></span><br>
                <small>Limit dzisiaj: <span id="userUsage" style="color:var(--soft-blue); font-weight:bold">0/5</span></small>
                <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-size:0.75rem; margin-left:10px; text-decoration: underline;">Wyloguj</button>
            </div>
        </div>

        <button onclick="toggleHistory()" style="background:var(--card-bg); color:var(--text); border:2px solid var(--soft-blue); padding:10px 25px; border-radius:20px; font-weight:bold; cursor:pointer; margin-bottom:20px; transition: 0.3s;">
            ⚙️ Menu & Historia
        </button>
        
        <h1>☁️ CLOUD AI ☁️</h1>
        <p style="opacity: 0.8; margin-top: 5px;">TWÓJ POMOCNIK W SZKOLE!</p>
        
        <span class="section-title">Wybierz przedmiot:</span>
        <div class="picker">
            <div class="card active" onclick="setVal('subject', 'matematyka', this)"><span>📐</span>Matma</div>
            <div class="card" onclick="setVal('subject', 'polski', this)"><span>📚</span>Polski</div>
            <div class="card" onclick="setVal('subject', 'fizyka', this)"><span>⚛️</span>Fizyka</div>
            <div class="card" onclick="setVal('subject', 'inne', this)"><span>🌍</span>Inne</div>
        </div>

        <span class="section-title">Poziom szkoły:</span>
        <div class="picker">
            <div class="card active" onclick="setVal('level', 'liceum', this)">Liceum</div>
            <div class="card" onclick="setVal('level', 'podstawowka', this)">Podstawówka</div>
        </div>

        <input type="hidden" id="subject" value="matematyka">
        <input type="hidden" id="level" value="liceum">

        <div style="background:var(--card-bg); border:3px dashed var(--soft-blue); border-radius:30px; padding:35px; margin:25px 0; cursor:pointer; position:relative">
            <span style="font-size:2.5rem">📸</span>
            <p id="fileName" style="margin:10px 0 0; font-weight: bold;">Dodaj zdjęcie zadania</p>
            <input type="file" id="imageInput" accept="image/*" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer" onchange="document.getElementById('fileName').innerText = this.files[0].name">
        </div>

        <button class="solve-btn" id="solveBtn" onclick="solve()">ROZWIĄŻ ZADANIE</button>
        <div class="loader" id="loader"></div>

        <div id="result"></div>
        <button id="copyBtn" class="copy-btn" onclick="copyResult()">📋 Kopiuj wynik</button>

        <div class="chat-box" id="chatSection">
            <strong style="font-size: 0.9rem;">💬 Masz pytanie do rozwiązania?</strong>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="Np. Skąd się wziął ten wzór?">
                <button onclick="askChat()" style="background:var(--soft-blue); color:white; border:none; padding:10px 15px; border-radius:15px; cursor:pointer; font-weight:bold">Pytaj</button>
            </div>
            <div id="chatResponse" style="margin-top:15px; border-left:3px solid var(--soft-blue); padding-left:10px; font-size: 0.95rem;"></div>
        </div>

        <div style="margin-top:35px; padding-top: 15px; border-top: 1px dashed var(--soft-blue); opacity:0.8">
            <small style="color:var(--soft-blue); font-weight:bold">🎧 SPOFY PLAYER</small>
            <audio controls style="width:100%; height:30px; filter: hue-rotate(180deg); margin-top:10px">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCm5UHUdv5thmBaOrm4x9rNT4GSqh8Zg0Q",
            authDomain: "cloud-ai-ac869.firebaseapp.com",
            projectId: "cloud-ai-ac869",
            storageBucket: "cloud-ai-ac869.firebasestorage.app",
            messagingSenderId: "488239859442",
            appId: "1:488239859442:web:cc50de432944c73cf2f26b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let isPremium = false;

        // Monitoring Logowania
        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                await syncUserStatus();
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
        });

        async function login() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            } catch (e) { alert("Błąd logowania."); }
        }

        function logout() { auth.signOut(); location.reload(); }

        async function syncUserStatus() {
            if (!currentUser) return;
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            const today = new Date().toDateString();

            if (!doc.exists) {
                await docRef.set({ usage: 0, premium: false, lastReset: today });
            } else {
                const data = doc.data();
                isPremium = data.premium;
                if (data.lastReset !== today) {
                    await docRef.update({ usage: 0, lastReset: today });
                }
                document.getElementById('userUsage').innerText = isPremium ? "∞ (Premium)" : `${data.usage || 0}/5`;
            }
        }

        // MOTYW
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('cloudSolveTheme', theme);
        }
        setTheme(localStorage.getItem('cloudSolveTheme') || 'light');

        // KOPIOWANIE
        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ Skopiowano!";
                setTimeout(() => btn.innerText = "📋 Kopiuj wynik", 2000);
            });
        }

        function toggleHistory() { document.getElementById('sidebar').classList.toggle('active'); loadHistory(); }
        
        function setVal(id, val, el) {
            document.getElementById(id).value = val;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        async function solve() {
            if (!currentUser) return alert("Musisz się zalogować, aby rozwiązać zadanie! 🔑");
            
            const docRef = db.collection('users').doc(currentUser.uid);
            const userSnap = await docRef.get();
            const userData = userSnap.data();

            if (!userData.premium && userData.usage >= 5) {
                return alert("Wykorzystałeś dzisiejszy limit (5 zdjęć). Uzyskaj Premium u administratora! ☁️🚀");
            }

            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return alert("Wgraj zdjęcie! 📸");
            
            const btn = document.getElementById('solveBtn');
            const loader = document.getElementById('loader');
            const resDiv = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');

            btn.disabled = true; loader.style.display = 'block'; resDiv.style.display = 'none'; copyBtn.style.display = 'none';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('subject', document.getElementById('subject').value);
            formData.append('level', document.getElementById('level').value);

            try {
                const response = await fetch('/solve', { method: 'POST', body: formData });
                const data = await response.json();
                resDiv.innerHTML = marked.parse(data.result);
                resDiv.style.display = 'block';
                copyBtn.style.display = 'flex';
                document.getElementById('chatSection').style.display = 'block';
                if (window.MathJax) MathJax.typesetPromise([resDiv]);
                
                // Aktualizacja limitu w Firebase
                await docRef.update({ usage: firebase.firestore.FieldValue.increment(1) });
                await syncUserStatus();

                let history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
                history.unshift({ id: Date.now(), date: new Date().toLocaleString(), subject: document.getElementById('subject').value, content: data.result });
                localStorage.setItem('cloudSolveHistory', JSON.stringify(history.slice(0, 10)));
            } catch (err) { alert("Błąd połączenia z serwerem."); }
            finally { btn.disabled = false; loader.style.display = 'none'; }
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('cloudSolveHistory') || '[]');
            const list = document.getElementById('historyList');
            const icons = { matematyka: '📐', polski: '📚', fizyka: '⚛️', inne: '🌍' };
            list.innerHTML = history.map(item => `
                <div onclick="viewHistoryItem(${item.id})" style="background:var(--card-bg); padding:12px; margin-bottom:10px; border-radius:15px; cursor:pointer; text-align:left; border:1px solid var(--soft-blue); font-size: 0.85rem;">
                    <span>${icons[item.subject] || '❓'}</span> <strong>${item.subject.toUpperCase()}</strong><br><small>${item.date}</small>
                </div>`).join('') || '<p style="font-size:0.8rem; opacity:0.6;">Brak skanów w tej przeglądarce.</p>';
        }

        function viewHistoryItem(id) {
            const item = JSON.parse(localStorage.getItem('cloudSolveHistory')).find(i => i.id === id);
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = marked.parse(item.content);
            resDiv.style.display = 'block';
            document.getElementById('copyBtn').style.display = 'flex';
            document.getElementById('chatSection').style.display = 'block';
            if (window.MathJax) MathJax.typesetPromise([resDiv]);
            toggleHistory();
        }

        async function askChat() {
            const question = document.getElementById('chatInput').value;
            const resp = document.getElementById('chatResponse');
            if(!question) return;
            resp.innerText = "Chmurka myśli... ☁️";
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, context: document.getElementById('result').innerText })
            });
            const data = await res.json();
            resp.innerHTML = marked.parse(data.answer);
            if (window.MathJax) MathJax.typesetPromise([resp]);
        }
    </script>
</body>
</html>
