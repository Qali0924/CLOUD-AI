<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOUD AI | TWÓJ INNOWACYJNY POMOCNIK!</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --sky: #a3e0f9; --soft-blue: #3a86ff; --dark: #023e8a;
            --glass: rgba(255, 255, 255, 0.75); --white: #ffffff;
            --text: #023e8a; --card-bg: #ffffff; --success-bg: #d8f3dc;
            --cheat-red: #ff4d4d;
        }

        [data-theme="dark"] {
            --sky: #0b132b; --soft-blue: #5bc0be; --dark: #ffffff;
            --glass: rgba(28, 37, 65, 0.85); --white: #1c2541;
            --text: #ffffff; --card-bg: #3a506b; --success-bg: #1b4332;
        }

        body { 
            margin: 0; padding: 20px; font-family: 'Quicksand', sans-serif;
            background-color: var(--sky); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh; 
            transition: background-color 0.5s ease;
        }

        .sky-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .cloud { background: var(--white); border-radius: 100px; position: absolute; filter: blur(10px); opacity: 0.3; animation: move linear infinite; }
        @keyframes move { from { left: -400px; } to { left: 100%; } }
        .c1 { width: 300px; height: 100px; top: 10%; animation-duration: 45s; }

        .container { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 650px; width: 100%; border: 2px solid rgba(255,255,255,0.2); text-align: center;
        }

        .user-panel { background: var(--card-bg); padding: 15px; border-radius: 25px; margin-bottom: 20px; border: 1px solid var(--soft-blue); }
        .login-btn { background: #db4437; color: white; border: none; padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; }

        .section-title { display:block; text-align:left; font-weight:bold; margin:20px 0 10px; font-size: 0.9rem; }
        .picker { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .card { background: var(--card-bg); color: var(--text); padding: 12px; border-radius: 20px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; flex: 1; min-width: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-weight: bold; }
        .card.active { border-color: var(--soft-blue); transform: translateY(-3px); }
        .card.cheat-card.active { border-color: var(--cheat-red); background: #fff1f1; color: var(--cheat-red); }
        .card span { display: block; font-size: 1.5rem; }

        .solve-btn { background: linear-gradient(135deg, var(--soft-blue), var(--dark)); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 10px 20px rgba(58, 134, 255, 0.3); transition: 0.3s; }
        .solve-btn:disabled { opacity: 0.6; }
        
        #result { margin-top: 25px; text-align: left; background: var(--card-bg); padding: 25px; border-radius: 30px; display: none; border: 2px solid var(--soft-blue); line-height: 1.6; }
        .loader { display: none; margin: 20px auto; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--soft-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sky-bg"><div class="cloud c1"></div></div>

    <div class="container">
        <div class="user-panel">
            <button id="loginBtn" class="login-btn" onclick="login()">🔑 ZALOGUJ SIĘ PRZEZ GOOGLE 🔑</button>
            <div id="userInfo" style="display:none;">
                <span id="userName" style="font-weight:bold;"></span> | 
                <small>LIMIT: <span id="userUsage">0/5</span></small>
                <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; text-decoration: underline; margin-left:10px;">Wyloguj</button>
            </div>
        </div>
        
        <h1>☁️ CLOUD AI ☁️</h1>

        <span class="section-title">Wybierz tryb odpowiedzi:</span>
        <div class="picker">
            <div class="card active" onclick="setMode('standard', this)"><span>💡</span>Standard</div>
            <div class="card cheat-card" onclick="setMode('cheat', this)"><span>⚡</span>ŚCIĄGANIE</div>
        </div>

        <span class="section-title">Przedmiot:</span>
        <div class="picker">
            <div class="card active" onclick="setVal('subject', 'matematyka', this)"><span>📐</span>Matma</div>
            <div class="card" onclick="setVal('subject', 'polski', this)"><span>📚</span>Polski</div>
            <div class="card" onclick="setVal('subject', 'fizyka', this)"><span>⚛️</span>Fizyka</div>
        </div>

        <input type="hidden" id="subject" value="matematyka">
        <input type="hidden" id="workMode" value="standard">

        <div style="background:var(--card-bg); border:3px dashed var(--soft-blue); border-radius:30px; padding:35px; margin:25px 0; cursor:pointer; position:relative">
            <span style="font-size:2.5rem">📸</span>
            <p id="fileName" style="margin:10px 0 0; font-weight: bold;">Dodaj zdjęcie zadania</p>
            <input type="file" id="imageInput" accept="image/*" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer" onchange="document.getElementById('fileName').innerText = this.files[0].name">
        </div>

        <button class="solve-btn" id="solveBtn" onclick="solve()">ROZWIĄŻ ZADANIE</button>
        <div class="loader" id="loader"></div>

        <div id="result"></div>

        <div style="margin-top:35px; padding-top: 15px; border-top: 1px dashed var(--soft-blue); opacity:0.8">
            <small style="color:var(--soft-blue); font-weight:bold">🎧 SPOFY PLAYER</small>
            <audio id="mainAudio" controls style="width:100%; height:30px; filter: hue-rotate(180deg); margin-top:10px">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm5UHUdv5thmBaOrm4x9rNT4GSqh8Zg0Q",
            authDomain: "cloud-ai-ac869.firebaseapp.com",
            projectId: "cloud-ai-ac869",
            storageBucket: "cloud-ai-ac869.firebasestorage.app",
            messagingSenderId: "488239859442",
            appId: "1:488239859442:web:cc50de432944c73cf2f26b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                syncUserStatus();
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }

        async function syncUserStatus() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) document.getElementById('userUsage').innerText = doc.data().premium ? "∞" : `${doc.data().usage || 0}/5`;
        }

        function setVal(id, val, el) {
            document.getElementById(id).value = val;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function setMode(mode, el) {
            document.getElementById('workMode').value = mode;
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        async function solve() {
            if (!currentUser) return alert("Zaloguj się! 🔑");
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Wgraj zdjęcie! 📸");

            const btn = document.getElementById('solveBtn');
            const loader = document.getElementById('loader');
            const resDiv = document.getElementById('result');

            btn.disabled = true; loader.style.display = 'block';
            document.getElementById('mainAudio').play();

            const formData = new FormData();
            formData.append('image', file);
            formData.append('subject', document.getElementById('subject').value);
            formData.append('mode', document.getElementById('workMode').value); // Przesyłamy tryb ściągania

            try {
                const response = await fetch('/solve', { method: 'POST', body: formData });
                const data = await response.json();
                resDiv.innerHTML = marked.parse(data.result);
                resDiv.style.display = 'block';
                if (window.MathJax) await MathJax.typesetPromise([resDiv]);
                
                await db.collection('users').doc(currentUser.uid).update({ usage: firebase.firestore.FieldValue.increment(1) });
                syncUserStatus();
            } catch (err) { alert("Błąd serwera."); }
            finally { btn.disabled = false; loader.style.display = 'none'; }
        }
    </script>
</body>
</html>
